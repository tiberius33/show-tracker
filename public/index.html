<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Track your concert shows, setlists, and build your live music history" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MySetlists" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>MySetlists - Track Your Concert Journey</title>

    <!-- Open Graph (overridden per-page by react-helmet-async) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://mysetlists.net/" />
    <meta property="og:title"       content="MySetlists — Track Your Concert Journey" />
    <meta property="og:description" content="Build your personal concert history with setlists, ratings, and stats. Share memories with friends." />
    <meta property="og:image"       content="https://mysetlists.net/og-image.svg" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="MySetlists — Track Your Concert Journey" />
    <meta name="twitter:description" content="Build your personal concert history with setlists, ratings, and stats." />
    <meta name="twitter:image"       content="https://mysetlists.net/og-image.svg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://mysetlists.net/" />

    <!-- Google Search Console — replace PLACEHOLDER after verifying ownership -->
    <meta name="google-site-verification" content="PLACEHOLDER" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
