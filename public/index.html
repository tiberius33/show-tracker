<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Track every show you've attended, rate setlists, and share your concert history with friends." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MySetlists" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Show Tracker | Your Concert History</title>

    <!-- Open Graph (overridden per-page by react-helmet-async) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://mysetlists.net/" />
    <meta property="og:title"       content="Show Tracker | Your Concert History" />
    <meta property="og:description" content="Track every show you've attended, rate setlists, and share your concert history with friends." />
    <meta property="og:image"       content="https://mysetlists.net/og-image.svg" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Show Tracker | Your Concert History" />
    <meta name="twitter:description" content="Track every show you've attended, rate setlists, and share your concert history with friends." />
    <meta name="twitter:image"       content="https://mysetlists.net/og-image.svg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://mysetlists.net/" />

    <!--
      ╔══════════════════════════════════════════════════════════════╗
      ║  GOOGLE SEARCH CONSOLE VERIFICATION                        ║
      ║  Replace PASTE_YOUR_VERIFICATION_CODE_HERE with the code   ║
      ║  from Search Console → Settings → Ownership verification   ║
      ║  → HTML tag. It looks like a long alphanumeric string.     ║
      ╚══════════════════════════════════════════════════════════════╝
    -->
    <meta name="google-site-verification" content="PASTE_YOUR_VERIFICATION_CODE_HERE" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
