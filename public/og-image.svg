<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow circle -->
  <circle cx="600" cy="315" r="400" fill="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="82" y="215" width="100" height="100" rx="20" fill="url(#green)"/>
  <path d="M147 235v45c0 8.284-8.954 15-20 15s-20-6.716-20-15c0-8.284 8.954-15 20-15 4.418 0 8.507 1.026 11.818 2.762L138.818 240H122v-5h25z" fill="white"/>

  <!-- App name -->
  <text x="205" y="282" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-1">MySetlists</text>

  <!-- Tagline -->
  <text x="82" y="360" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="400" fill="#94a3b8">Track your concert journey. Share the memories.</text>

  <!-- Bottom decorative line -->
  <rect x="82" y="430" width="120" height="4" rx="2" fill="url(#green)"/>

  <!-- Feature pills -->
  <rect x="82" y="462" width="170" height="40" rx="20" fill="#34d39920"/>
  <text x="167" y="487" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#34d399" text-anchor="middle">Setlists</text>

  <rect x="268" y="462" width="150" height="40" rx="20" fill="#34d39920"/>
  <text x="343" y="487" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#34d399" text-anchor="middle">Ratings</text>

  <rect x="434" y="462" width="160" height="40" rx="20" fill="#34d39920"/>
  <text x="514" y="487" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#34d399" text-anchor="middle">Friends</text>

  <rect x="610" y="462" width="190" height="40" rx="20" fill="#34d39920"/>
  <text x="705" y="487" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#34d399" text-anchor="middle">Memories</text>

  <!-- Domain -->
  <text x="1118" y="590" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#475569" text-anchor="end">mysetlists.net</text>
</svg>
