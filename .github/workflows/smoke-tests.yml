name: Smoke Tests

on:
  # Run after deploy completes on main branch
  push:
    branches: [main]
  # Run on pull requests to main (pre-merge validation)
  pull_request:
    branches: [main]
  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL (defaults to https://mysetlists.net)'
        required: false
        default: 'https://mysetlists.net'

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # On push to main, wait for Netlify to finish deploying before testing
      - name: Wait for Netlify deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: sleep 90

      - name: Run smoke tests
        env:
          TEST_BASE_URL: ${{ inputs.base_url || 'https://mysetlists.net' }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TEST_DATABASE_ID: ${{ secrets.NOTION_TEST_DATABASE_ID }}
          TEST_SUITE_NAME: Smoke Tests
          ENVIRONMENT: production
        run: npx playwright test --project=smoke

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: test-results/
          retention-days: 7
